  <line x1="22" y1="10" x2="22" y2="16" stroke="#E0DCD8" stroke-width="0.5"/>
  <line x1="27" y1="10" x2="27" y2="16" stroke="#E0DCD8" stroke-width="0.5"/>
  <line x1="33" y1="10" x2="33" y2="16" stroke="#E0DCD8" stroke-width="0.5"/>
  <!-- Tongue -->
  <ellipse cx="27" cy="24" rx="10" ry="5" fill="#C0605A"/>
  <!-- Upper Lip -->
  <path d="M10 9 Q18 5, 27 7 Q36 5, 45 9" stroke="#A0655A" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Lower Lip -->
  <path d="M14 26 Q27 32, 41 26" stroke="#A0655A" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Lip Corner Shadows -->
