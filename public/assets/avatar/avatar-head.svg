  <!-- Ears -->
  <path d="M22 88 Q14 88, 14 100 Q14 112, 22 112" fill="#D4A574" stroke="#C89B68" stroke-width="1"/>
  <path d="M158 88 Q166 88, 166 100 Q166 112, 158 112" fill="#D4A574" stroke="#C89B68" stroke-width="1"/>
